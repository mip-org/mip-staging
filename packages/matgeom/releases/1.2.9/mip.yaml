name: matgeom
description: "MATLAB geometry processing library in 2D and 3D."
version: "1.2.9"
license: "BSD-2-Clause"
homepage: "https://github.com/mattools/matGeom"
repository: "https://github.com/mattools/matGeom"
dependencies: []

addpaths:
  - path: "."
  - path: "geom2d"
  - path: "polygons2d"
  - path: "graphs"
  - path: "geom3d"
  - path: "meshes3d"
  - path: "utils"

builds:
  - architectures: [any]
    test_script: test_matgeom.m
